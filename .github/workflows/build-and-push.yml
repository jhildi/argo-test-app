name: Build and publish apiservice image

on:
  push:
    branches: [main]
    paths:
      - src/**
      - .github/workflows/build-and-push.yml

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container image
        working-directory: src/HelloAspire.ApiService
        run: |
          dotnet publish -t:PublishContainer -r linux-x64 \
            -p:ContainerRegistry=ghcr.io \
            -p:ContainerRepository=${{ github.repository_owner }}/apiservice \
            -p:ContainerImageTag=${{ github.sha }}

      - uses: imranismail/setup-kustomize@v2

      - name: Update deployed image tag
        working-directory: deploy/kustomize/apiservice
        run: |
          kustomize edit set image ghcr.io/${{ github.repository_owner }}/apiservice=ghcr.io/${{ github.repository_owner }}/apiservice:${{ github.sha }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git diff --staged --quiet || (git commit -m "Update apiservice image to ${{ github.sha }}" && git push)
