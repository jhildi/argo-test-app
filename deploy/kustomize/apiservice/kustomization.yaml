resources:
- deployment.yaml
- service.yaml
- ingress.yaml

images:
- name: ghcr.io/jhildi/apiservice
  newTag: 8cd5a2bbcd7d6522279c9b82e33da55bf6b70b14

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: apiservice-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTP_PORTS=8080
    - ASPNETCORE_URLS=http://+:8080;

